name: Deploy deck to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble deploy folder
        run: |
          mkdir -p dist
          # Promote the deck to the site root, rewriting the ../Assets/
          # paths so they resolve next to the new index.html.
          sed 's|\.\./Assets/|Assets/|g' Drafts/anticon-talk-draft-007.html > dist/index.html
          # Copy the Assets folder alongside the deck.
          cp -r Assets dist/Assets

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
